name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        working-directory: movil2-main
        run: npm install

      - name: Pipeline ejecutado correctamente
        run: echo "CI/CD ejecutado correctamente"