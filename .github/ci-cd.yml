name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: movil2-main
        run: npm install

      - name: Pipeline OK
        run: echo "Todo funcionando correctamente"